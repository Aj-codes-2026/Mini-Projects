<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
</head>
<body>
    <div class="password-container">
        <h1>Password Generator</h1>
        <div class="password">
            <p id="password"></p>
            <button id="copy">Copy</button>
        </div>
        <div class="password-code">
            <div class="length-div">
                <label for="length" class="length-label"><span>Character Length</span><span id="range-value">8</span></label>
            <input type="range" id="length" min="8" max="15" value="8" step="1"></div>
            <div class="checkboxes">
                <div class="input-div"><input type="checkbox" name="check" id="uppercase"><label for="uppercase">Include Uppercase Letters</label></div>
                <div class="input-div"><input type="checkbox" name="check" id="lowercase" ><label for="lowercase">Include Lowercase Letters</label></div>
                <div class="input-div"><input type="checkbox" name="check" id="numbers"><label for="numbers">Include Numbers</label></div>
                <div class="input-div"><input type="checkbox" name="check" id="symbols"><label for="symbols">Include Symbols</label></div>
            </div>
            <p id="strength"></p>
            <button id="generate-btn" type="button">Generate</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
