<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container1" id="container1">
      <h2>Weather App</h2>
      <div class="input-group">
        <select id="option">
          <option value="" disabled selected>Select a city</option>
          <option value="new york">New York, USA</option>
          <option value="los angeles">Los Angeles, USA</option>
          <option value="chicago">Chicago, USA</option>
          <option value="tokyo">Tokyo, Japan</option>
          <option value="london">London, UK</option>
          <option value="lagos">Lagos, Nigeria</option>
          <option value="paris">Paris, France</option>
          <option value="sydney">Sydney, Australia</option>
        </select>
        <button type="button" id="get-weather-btn">Get Weather</button>
      </div>
      <div class="loading" id="loading">Loading weather data...</div>
      <p id="error">⚠️ Please select a city.</p>
    </div>

    <div class="container2" id="container2">
      <button class="back-btn" id="back-btn">← Back</button>
      <h2>Weather App</h2>
      <h1 id="location"></h1>
      <p id="country"></p>
      <div class="img-container">
        <img src="cloudy_17907932.png" alt="weather icon" id="weather-icon" />
      </div>
      <p id="main-temperature"></p>
      <p id="feels-like"></p>
      <div class="weather-grid">
        <div class="weather-card">
          <span class="color">Humidity:</span>
          <span id="humidity" class="value"></span>
        </div>
        <div class="weather-card">
          <span class="color">Cloud Cover:</span>
          <span id="cloud" class="value"></span>
        </div>
        <div class="weather-card">
          <span class="color">Wind:</span>
          <span id="wind" class="value"></span>
        </div>
        <div class="weather-card">
          <span class="color">Gusts:</span>
          <span id="wind-gust" class="value"></span>
        </div>
        <div class="weather-card">
          <span class="color">Pressure:</span>
          <span id="pressure" class="value"></span>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
