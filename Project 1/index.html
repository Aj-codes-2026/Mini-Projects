<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter App</title>
  </head>
  <body>
    <h1>Counter</h1>
    <div class="counter">
      <input id="num-display" value="0" type="number"/>
      <div class="btn-ctn">
        <button id="btn-1" class="btn one">+1</button>
        <button id="btn-2" class="btn two">-1</button>
        <button id="btn-3" class="btn three">+5</button>
        <button id="btn-4" class="btn four">-5</button>
      </div>
      <button id="reset-btn" class="reset">Reset</button>
    </div>
    <script src="script2.js"></script>
  </body>
</html>
